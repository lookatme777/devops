- name: Install Docker in LXC
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Update apt
      apt:
        update_cache: yes # analogue apt update

    - name: Install dependencies
      apt:
        name: 
          - ca-certificates
          - curl
        state: present

    - name: Update apt
      apt:
        update_cache: yes # analogue apt update

    - name: Create keyrings directory
      file: 
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add docker GPG key # необходимо для подтверждения, что этот репозиторий можно качать
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/debian/gpg"
        dest: "/etc/apt/keyrings/docker.asc"
        mode: '0644'

    - name: Add docker repo
      ansible.builtin.apt_repository:
        repo: > 
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] 
          https://download.docker.com/linux/debian 
          {{ ansible_distribution_release }} stable 
        state: present

    - name: Install docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io 
          - docker-buildx-plugin 
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Enable docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: deployer
        groups: docker
        append: yes