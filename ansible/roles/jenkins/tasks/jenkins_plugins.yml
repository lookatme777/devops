- name: Install Jenkins plugins
  hosts: jenkins
  become: true
  gather_facts: false

  tasks:
    - name: Install plugins
      community.general.jenkins_plugin:
        name: "{{ item }}"
        url: "{{ jenkins_url }}"
        url_username: "{{ jenkins_login }}"
        url_password: "{{ jenkins_password }}"
        state: present
        timeout: 120
      loop: # цикл для сокращения тасков на каждый плагин
        - git
        - workflow-aggregator
        - docker-workflow
        - credentials-binding
        - ssh-agent
      register: plugins

    - name: Wait for Jenkins restart safety
      pause:
        seconds: 10

    - name: Restart Jenkins
      service:
        name: jenkins
        state: restarted
      when: plugins.changed