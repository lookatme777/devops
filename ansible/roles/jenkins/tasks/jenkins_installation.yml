- name: Install Jenkins for LXC
  hosts: jenkins
  become: true
  gather_facts: false

  tasks:
    - name: Install required packages
      apt:
        name:
          - gpg
          - ca-certificates
        state: present
        update_cache: yes

    - name: Update package
      apt:
        update_cache: yes

    - name: Install Java
      apt: 
        name: openjdk-21-jre
        state: present

    - name: Ensure keyrings dir exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Jenkins GPG key
      ansible.builtin.get_url:
        url: "https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key"
        dest: "/etc/apt/keyrings/jenkins-keyring.asc"

    - name: Add Jenkins repo
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present

    - name: Update package
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Start Jenkins
      service:
        name: jenkins
        state: started
        enabled: true